<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">JarView Neon Favicon</title>
  <desc id="desc">Stylized glowing jar with camera aperture inside a dark rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10122b"/>
      <stop offset="1" stop-color="#04060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#5ef8ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00ffc6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8ef1ff"/>
      <stop offset="1" stop-color="#2cf5bd"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#92b2ff"/>
      <stop offset="1" stop-color="#8ef1ff"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <circle cx="64" cy="44" r="40" fill="url(#glow)" opacity="0.55"/>

  <g transform="translate(30 20)">
    <rect x="8" width="52" height="10" rx="4" fill="url(#cap)"/>
    <rect y="12" width="68" height="86" rx="22" fill="none" stroke="url(#jar)" stroke-width="6"/>
    <rect y="26" width="68" height="62" rx="22" fill="url(#jar)" opacity="0.25"/>
    <path d="M14 42h40" stroke="#98fff6" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  </g>

  <g transform="translate(32 44)">
    <circle cx="32" cy="32" r="22" fill="none" stroke="#b6fff6" stroke-width="4"/>
    <path d="M32 12l6.5 12.5 13.5.8-10.5 8.6 4 13-13.5-7-13.5 7 4-13-10.5-8.6 13.5-.8z"
      fill="#0b192c"/>
    <path d="M32 12l6.5 12.5 13.5.8-10.5 8.6 4 13-13.5-7z" fill="#26ffd2" opacity="0.8"/>
  </g>
</svg>
